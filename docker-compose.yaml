services:
  trt-builder:
    image: nvcr.io/nvidia/tritonserver:26.05-py3   # trtexec уже внутри образа -> та же версия TRT, что у triton
    # собрать engine прямо из end2end ONNX (NMS встроен; trtexec парсит его сам)
    command:
      - /usr/src/tensorrt/bin/trtexec
      - --onnx=/models/detect_blood/1/model.onnx
      - --saveEngine=/models/detect_blood_trt/1/model.plan
      - --fp16
      - --minShapes=images:1x3x640x640
      - --optShapes=images:8x3x640x640
      - --maxShapes=images:16x3x640x640
    volumes:
      - ./triton/models:/models                  # репозиторий моделей: читает onnx, пишет plan
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia                       # GPU нужен для сборки engine
              device_ids: ["0"]
              capabilities: [gpu]
    restart: "no"                                  # одноразовый: собрал план и вышел

 
  triton:
    image: nvcr.io/nvidia/tritonserver:26.05-py3   # образ Triton (TRT 10.16.1, поддержка Blackwell)
    container_name: triton                         # фикс. имя контейнера
    # tritonserver: репозиторий моделей + poll-режим (подхват изменений без рестарта)
    command:
      - tritonserver
      - --model-repository=/models
      - --model-control-mode=poll
      - --repository-poll-secs=5
    ports:
      - "8000:8000"                                # HTTP/REST
      - "8001:8001"                                # gRPC
      - "8002:8002"                                # /metrics для Prometheus
    volumes:
      - ./triton/models:/models                    # проброс репозитория моделей (хост:контейнер)
    shm_size: "1gb"                                # shared memory: дефолтных 64МБ Triton'у мало
    depends_on:
      trt-builder:
        condition: service_completed_successfully  # стартовать ТОЛЬКО после успешной сборки плана
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]                    # CUDA-индекс карты (проверь nvidia-smi какой это GPU)
              capabilities: [gpu]
    restart: unless-stopped

  
  prometheus:
    image: prom/prometheus:latest                  # официальный образ Prometheus
    container_name: prometheus
    ports:
      - "9090:9090"                                # веб-интерфейс Prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml  # наш конфиг скрейпа
    depends_on:
      - triton                                     # есть смысл стартовать после сервера метрик
    restart: unless-stopped

  
  grafana:
    image: grafana/grafana:latest                  # официальный образ Grafana
    container_name: grafana
    ports:
      - "3000:3000"                                # веб-интерфейс Grafana (admin/admin)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin           # пароль админа (логин admin)
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning  # авто-настройка datasource + провайдера дашбордов
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards  # сами json-дашборды
    depends_on:
      - prometheus                                 # источник данных должен быть готов
    restart: unless-stopped
